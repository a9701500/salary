<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薪資計算工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --bg-page: #f5f5f3;
    --bg-card: #ffffff;
    --bg-soft: #f1efe8;
    --bg-accent: #e6f1fb;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-accent: #0c447c;
    --text-danger: #791f1f;
    --border-light: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.15);
    --border-accent: #378ADD;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    line-height: 1.6;
  }
  #app {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 0.25rem;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0 0 1.5rem;
  }
  input[type="number"], input[type="text"] {
    height: 36px;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    padding: 0 10px;
    font-size: 14px;
    background: var(--bg-card);
    color: var(--text-primary);
    width: 100%;
  }
  input:focus {
    outline: none;
    box-shadow: 0 0 0 2px var(--border-accent);
  }
  button {
    background: transparent;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-primary);
    font-family: inherit;
  }
  button:hover { background: var(--bg-soft); }
  button:active { transform: scale(0.98); }
  table { width: 100%; border-collapse: collapse; }
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 2rem;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
const e = React.createElement;
const { useState, useMemo } = React;

// 2026年勞保投保薪資分級表（11級）
const LABOR_GRADES = [29500,30300,31800,33300,34800,36300,38200,40100,42000,43900,45800];
// 2026年健保投保金額分級表
const NHI_GRADES = [29500,30300,31800,33300,34800,36300,38200,40100,42000,43900,45800,48200,50600,53000,55400,57800,60800,63800,66800,69800,72800,76500,80200,83900,87600,92100,96600,101100,105600,110900,116200,121500,126800,133100,139400,145700,152000,159500,167000,174500,182000,190900,199800,208700,217600,228100,238600,249100,259600,271900,284200,296500,313000];

function findGrade(salary, grades){
  for(const g of grades){ if(salary <= g) return g; }
  return grades[grades.length-1];
}

function calcLaborSelf(insuredSalary){
  // 勞保費率12.5%，員工自付20%
  return Math.round(insuredSalary * 0.125 * 0.2);
}
function calcNHISelf(insuredSalary){
  // 健保費率5.17%，員工自付30%
  return Math.round(insuredSalary * 0.0517 * 0.3);
}

function uid(){ return Math.random().toString(36).slice(2,9); }

function emptyEmployee(name){
  return {
    id: uid(),
    name: name || '員工',
    baseSalary: 30000,
    allowance: 0,
    otHours1: 0,
    otHours2: 0,
    leaveDeduct: 0,
    bonus: 0
  };
}

function App(){
  const [employees, setEmployees] = useState([emptyEmployee('員工A')]);
  const [activeId, setActiveId] = useState(employees[0].id);

  function updateEmp(id, patch){
    setEmployees(prev => prev.map(emp => emp.id === id ? {...emp, ...patch} : emp));
  }
  function addEmp(){
    const ne = emptyEmployee('員工' + String.fromCharCode(65 + employees.length));
    setEmployees(prev => [...prev, ne]);
    setActiveId(ne.id);
  }
  function removeEmp(id){
    setEmployees(prev => {
      const next = prev.filter(x => x.id !== id);
      if(next.length === 0){
        const ne = emptyEmployee('員工A');
        setActiveId(ne.id);
        return [ne];
      }
      if(activeId === id) setActiveId(next[0].id);
      return next;
    });
  }

  const computed = useMemo(() => {
    return employees.map(emp => {
      const hourlyRate = emp.baseSalary / 240;
      const ot1Pay = Math.round(emp.otHours1 * hourlyRate * 1.34);
      const ot2Pay = Math.round(emp.otHours2 * hourlyRate * 1.67);
      const grossBeforeInsurance = emp.baseSalary + emp.allowance + ot1Pay + ot2Pay + emp.bonus;
      const insuranceBase = emp.baseSalary + emp.allowance + ot1Pay + ot2Pay;
      const laborGrade = findGrade(insuranceBase, LABOR_GRADES);
      const nhiGrade = findGrade(insuranceBase, NHI_GRADES);
      const laborSelf = calcLaborSelf(laborGrade);
      const nhiSelf = calcNHISelf(nhiGrade);
      const totalDeduction = laborSelf + nhiSelf + emp.leaveDeduct;
      const netPay = grossBeforeInsurance - totalDeduction;
      return {
        ...emp, hourlyRate, ot1Pay, ot2Pay, grossBeforeInsurance,
        laborGrade, nhiGrade, laborSelf, nhiSelf, totalDeduction, netPay
      };
    });
  }, [employees]);

  const totals = useMemo(() => {
    return computed.reduce((acc, c) => ({
      gross: acc.gross + c.grossBeforeInsurance,
      deduction: acc.deduction + c.totalDeduction,
      net: acc.net + c.netPay
    }), {gross:0, deduction:0, net:0});
  }, [computed]);

  const active = employees.find(e => e.id === activeId);
  const activeComputed = computed.find(c => c.id === activeId);

  const fmt = (n) => Math.round(n).toLocaleString('zh-TW');

  return e('div', null,
    e('h1', null, '台灣薪資計算工具'),
    e('p', {className:'subtitle'}, '輸入底薪、津貼與加班時數，自動估算勞健保自付額與實領薪資（2026年費率）'),

    e('div', {style:{display:'flex', flexDirection:'column', gap:'1.25rem'}},
      // employee tabs
      e('div', {style:{display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center'}},
        employees.map(emp => e('button', {
          key: emp.id,
          onClick: () => setActiveId(emp.id),
          style:{
            background: emp.id === activeId ? 'var(--bg-accent)' : 'var(--bg-card)',
            color: emp.id === activeId ? 'var(--text-accent)' : 'var(--text-primary)',
            borderColor: emp.id === activeId ? 'var(--border-accent)' : 'var(--border-light)'
          }
        }, emp.name)),
        e('button', {onClick: addEmp}, '+ 新增員工')
      ),

      // active employee form
      active && e('div', {style:{background:'var(--bg-card)', border:'0.5px solid var(--border-light)', borderRadius:'var(--radius-lg)', padding:'1.25rem'}},
        e('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem'}},
          e('input', {
            type:'text',
            value: active.name,
            onChange: ev => updateEmp(active.id, {name: ev.target.value}),
            style:{fontSize:'15px', fontWeight:'500', border:'none', borderBottom:'0.5px solid var(--border-light)', background:'transparent', padding:'4px 0', width:'140px', height:'auto'}
          }),
          employees.length > 1 && e('button', {
            onClick: () => removeEmp(active.id),
            style:{color:'var(--text-danger)'}
          }, '移除')
        ),

        e('div', {style:{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(160px, 1fr))', gap:'12px', marginBottom:'1rem'}},
          e('div', null,
            e('label', {style:{fontSize:'13px', color:'var(--text-secondary)', display:'block', marginBottom:'4px'}}, '本薪 (元/月)'),
            e('input', {type:'number', value: active.baseSalary, min:0, step:100,
              onChange: ev => updateEmp(active.id, {baseSalary: Number(ev.target.value) || 0})})
          ),
          e('div', null,
            e('label', {style:{fontSize:'13px', color:'var(--text-secondary)', display:'block', marginBottom:'4px'}}, '固定津貼 (元/月)'),
            e('input', {type:'number', value: active.allowance, min:0, step:100,
              onChange: ev => updateEmp(active.id, {allowance: Number(ev.target.value) || 0})})
          ),
          e('div', null,
            e('label', {style:{fontSize:'13px', color:'var(--text-secondary)', display:'block', marginBottom:'4px'}}, '前2小時加班 (時/月)'),
            e('input', {type:'number', value: active.otHours1, min:0, step:1,
              onChange: ev => updateEmp(active.id, {otHours1: Number(ev.target.value) || 0})})
          ),
          e('div', null,
            e('label', {style:{fontSize:'13px', color:'var(--text-secondary)', display:'block', marginBottom:'4px'}}, '超過2小時加班 (時/月)'),
            e('input', {type:'number', value: active.otHours2, min:0, step:1,
              onChange: ev => updateEmp(active.id, {otHours2: Number(ev.target.value) || 0})})
          ),
          e('div', null,
            e('label', {style:{fontSize:'13px', color:'var(--text-secondary)', display:'block', marginBottom:'4px'}}, '獎金 (恩惠性,不計勞健保)'),
            e('input', {type:'number', value: active.bonus, min:0, step:100,
              onChange: ev => updateEmp(active.id, {bonus: Number(ev.target.value) || 0})})
          ),
          e('div', null,
            e('label', {style:{fontSize:'13px', color:'var(--text-secondary)', display:'block', marginBottom:'4px'}}, '請假/其他扣款 (元)'),
            e('input', {type:'number', value: active.leaveDeduct, min:0, step:100,
              onChange: ev => updateEmp(active.id, {leaveDeduct: Number(ev.target.value) || 0})})
          )
        ),

        activeComputed && e('div', {style:{borderTop:'0.5px solid var(--border-light)', paddingTop:'1rem'}},
          e('div', {style:{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(140px, 1fr))', gap:'12px', marginBottom:'1rem'}},
            e('div', {style:{background:'var(--bg-soft)', borderRadius:'var(--radius-md)', padding:'0.75rem 1rem'}},
              e('p', {style:{fontSize:'13px', color:'var(--text-secondary)', margin:'0 0 4px'}}, '加班費小計'),
              e('p', {style:{fontSize:'18px', fontWeight:'500', margin:0}}, 'NT$ ' + fmt(activeComputed.ot1Pay + activeComputed.ot2Pay))
            ),
            e('div', {style:{background:'var(--bg-soft)', borderRadius:'var(--radius-md)', padding:'0.75rem 1rem'}},
              e('p', {style:{fontSize:'13px', color:'var(--text-secondary)', margin:'0 0 4px'}}, '應發薪資'),
              e('p', {style:{fontSize:'18px', fontWeight:'500', margin:0}}, 'NT$ ' + fmt(activeComputed.grossBeforeInsurance))
            ),
            e('div', {style:{background:'var(--bg-soft)', borderRadius:'var(--radius-md)', padding:'0.75rem 1rem'}},
              e('p', {style:{fontSize:'13px', color:'var(--text-secondary)', margin:'0 0 4px'}}, '勞健保自付額'),
              e('p', {style:{fontSize:'18px', fontWeight:'500', margin:0}}, 'NT$ ' + fmt(activeComputed.laborSelf + activeComputed.nhiSelf))
            ),
            e('div', {style:{background:'var(--bg-accent)', borderRadius:'var(--radius-md)', padding:'0.75rem 1rem'}},
              e('p', {style:{fontSize:'13px', color:'var(--text-accent)', margin:'0 0 4px'}}, '實領薪資'),
              e('p', {style:{fontSize:'18px', fontWeight:'500', margin:0, color:'var(--text-accent)'}}, 'NT$ ' + fmt(activeComputed.netPay))
            )
          ),
          e('table', {style:{fontSize:'13px'}},
            e('tbody', null,
              e('tr', null,
                e('td', {style:{color:'var(--text-secondary)', padding:'4px 0'}}, '投保薪資（勞保 / 健保）'),
                e('td', {style:{textAlign:'right', padding:'4px 0'}}, fmt(activeComputed.laborGrade) + ' / ' + fmt(activeComputed.nhiGrade))
              ),
              e('tr', null,
                e('td', {style:{color:'var(--text-secondary)', padding:'4px 0'}}, '勞保自付（12.5% x 20%）'),
                e('td', {style:{textAlign:'right', padding:'4px 0'}}, 'NT$ ' + fmt(activeComputed.laborSelf))
              ),
              e('tr', null,
                e('td', {style:{color:'var(--text-secondary)', padding:'4px 0'}}, '健保自付（5.17% x 30%）'),
                e('td', {style:{textAlign:'right', padding:'4px 0'}}, 'NT$ ' + fmt(activeComputed.nhiSelf))
              )
            )
          )
        )
      ),

      // summary table
      employees.length > 1 && e('div', null,
        e('p', {style:{fontSize:'13px', color:'var(--text-secondary)', margin:'0 0 8px'}}, '全員工匯總'),
        e('table', {style:{fontSize:'13px', tableLayout:'fixed', background:'var(--bg-card)', border:'0.5px solid var(--border-light)', borderRadius:'var(--radius-lg)'}},
          e('thead', null,
            e('tr', {style:{borderBottom:'0.5px solid var(--border-light)'}},
              e('th', {style:{textAlign:'left', padding:'8px 10px', color:'var(--text-secondary)'}}, '姓名'),
              e('th', {style:{textAlign:'right', padding:'8px 10px', color:'var(--text-secondary)'}}, '應發'),
              e('th', {style:{textAlign:'right', padding:'8px 10px', color:'var(--text-secondary)'}}, '扣款'),
              e('th', {style:{textAlign:'right', padding:'8px 10px', color:'var(--text-secondary)'}}, '實領')
            )
          ),
          e('tbody', null,
            computed.map(c => e('tr', {key: c.id, style:{borderBottom:'0.5px solid var(--border-light)'}},
              e('td', {style:{padding:'8px 10px'}}, c.name),
              e('td', {style:{textAlign:'right', padding:'8px 10px'}}, fmt(c.grossBeforeInsurance)),
              e('td', {style:{textAlign:'right', padding:'8px 10px'}}, fmt(c.totalDeduction)),
              e('td', {style:{textAlign:'right', padding:'8px 10px', fontWeight:'500'}}, fmt(c.netPay))
            )),
            e('tr', null,
              e('td', {style:{padding:'10px', fontWeight:'500'}}, '合計'),
              e('td', {style:{textAlign:'right', padding:'10px', fontWeight:'500'}}, fmt(totals.gross)),
              e('td', {style:{textAlign:'right', padding:'10px', fontWeight:'500'}}, fmt(totals.deduction)),
              e('td', {style:{textAlign:'right', padding:'10px', fontWeight:'500'}}, fmt(totals.net))
            )
          )
        )
      )
    ),

    e('footer', null,
      '採用2026年勞保費率12.5%、健保費率5.17%估算，投保薪資對照官方分級表簡化計算，僅供參考，正式投保金額請以勞健保局公告分級表為準。',
      e('br'),
      '資料僅儲存在使用者瀏覽器當前畫面，重新整理頁面將清空，不會上傳至任何伺服器。'
    )
  );
}

ReactDOM.render(e(App), document.getElementById('app'));
})();
</script>
</body>
</html>
